name: Release Desktop App

on:
  repository_dispatch:
    types: [production-release]
  workflow_dispatch:
    inputs:
      version:
        description: 'Version to release (e.g., v1.0.0)'
        required: true
        type: string

jobs:
  publish-desktop:
    permissions:
      contents: write
    strategy:
      fail-fast: false
      matrix:
        include:
          - platform: 'macos-15'
            args: '--mac zip --x64 --arm64'
          - platform: 'windows-latest'
            args: '--win nsis zip --x64'

    runs-on: ${{ matrix.platform }}

    steps:
      - uses: actions/checkout@v4

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 10

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: lts/*
          cache: pnpm

      - name: Install dependencies
        run: pnpm install

      - name: Build workspace packages
        run: pnpm run build:package

      - name: Resolve release version
        id: version
        shell: bash
        run: |
          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            VERSION="${{ inputs.version }}"
          elif [ "${{ github.event_name }}" = "repository_dispatch" ]; then
            VERSION="${{ github.event.client_payload.tag_name }}"
          else
            VERSION="v$(node -p "require('./package.json').version")"
          fi
          echo "version=$VERSION" >> $GITHUB_OUTPUT
          echo "Using version: $VERSION"

      - name: Build and publish Electron app
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          CSC_IDENTITY_AUTO_DISCOVERY: 'false'
          CI: true
          GITHUB_SHA: ${{ github.sha }}
          COMMIT_HASH: ${{ github.sha }}
        run: |
          echo "Building desktop artifacts for ${{ steps.version.outputs.version }}"
          pnpm --filter @arcadia-eternity/web-ui run build
          pnpm --filter @arcadia-eternity/web-ui run electron:pack:publish -- ${{ matrix.args }}

  notify:
    needs: publish-desktop
    runs-on: ubuntu-latest
    if: always()
    steps:
      - name: Notify completion
        run: |
          if [ "${{ needs.publish-desktop.result }}" == "success" ]; then
            echo "✅ Desktop release completed successfully!"
          else
            echo "❌ Desktop release failed!"
            echo "Release result: ${{ needs.publish-desktop.result }}"
          fi
